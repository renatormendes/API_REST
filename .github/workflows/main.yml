name: Java Native CI

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and Run Server
        run: |
          make compile
          java -cp out Main & 
          sleep 5 # Tempo para o servidor subir

      - name: Run Tests
        run: make test
